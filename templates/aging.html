{% extends "base.html" %}

{% block title %}陈酿预测 - 醋风味监测系统{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h1>陈酿时间预测</h1>
        <p class="subtitle">基于动力学模型预测醋的风味演化</p>
    </div>

    <div class="dashboard">
        <div class="card params-card">
            <h2>预测参数</h2>
            
            <div class="param-section">
                <h3>时间范围</h3>
                <div class="param-row">
                    <label for="current_months">当前醋龄 (月)</label>
                    <input type="range" id="current_months" min="0" max="100" value="36">
                    <span class="param-value" id="current_months_value">36</span>
                </div>
                <div class="param-row">
                    <label for="target_months">目标醋龄 (月)</label>
                    <input type="range" id="target_months" min="0" max="120" value="60">
                    <span class="param-value" id="target_months_value">60</span>
                </div>
            </div>

            <div class="param-section">
                <h3>工艺条件</h3>
                <div class="select-row">
                    <label for="aging_process">发酵类型</label>
                    <select id="aging_process">
                        <option value="固态发酵">固态发酵</option>
                        <option value="液态发酵">液态发酵</option>
                        <option value="固液复合">固液复合</option>
                    </select>
                </div>
                <div class="select-row">
                    <label for="aging_material">原料</label>
                    <select id="aging_material">
                        <option value="糯米">糯米</option>
                        <option value="大米">大米</option>
                        <option value="高粱">高粱</option>
                        <option value="小麦">小麦</option>
                        <option value="玉米">玉米</option>
                        <option value="苹果">苹果</option>
                        <option value="葡萄">葡萄</option>
                    </select>
                </div>
                <div class="select-row">
                    <label for="aging_style">工艺风格</label>
                    <select id="aging_style">
                        <option value="传统">传统</option>
                        <option value="现代">现代</option>
                    </select>
                </div>
                <div class="select-row">
                    <label for="aging_vessel">陈酿容器</label>
                    <select id="aging_vessel">
                        <option value="陶缸" selected>陶缸</option>
                        <option value="不锈钢">不锈钢</option>
                    </select>
                </div>
                <div class="select-row">
                    <label for="aging_temperature">陈酿温度</label>
                    <select id="aging_temperature">
                        <option value="低温">低温 (10-15°C)</option>
                        <option value="常温" selected>常温 (20-25°C)</option>
                        <option value="高温">高温 (30-35°C)</option>
                    </select>
                </div>
            </div>

            <button class="btn-primary" onclick="predictAging()">预测陈酿</button>
        </div>

        <div class="card results-card">
            <div class="result-section">
                <h2>参数演化曲线</h2>
                <div class="chart-container">
                    <canvas id="trajectoryChart"></canvas>
                </div>
            </div>

            <div class="result-section">
                <h2>预测状态 (<span id="targetLabel">60</span>月)</h2>
                <div class="prediction-grid" id="predictionResult">
                    <div class="pred-item">
                        <span class="pred-label">总酸</span>
                        <span class="pred-value" id="pred_total_acid">--</span>
                    </div>
                    <div class="pred-item">
                        <span class="pred-label">不挥发酸</span>
                        <span class="pred-value" id="pred_non_volatile_acid">--</span>
                    </div>
                    <div class="pred-item">
                        <span class="pred-label">还原糖</span>
                        <span class="pred-value" id="pred_reducing_sugar">--</span>
                    </div>
                    <div class="pred-item">
                        <span class="pred-label">总氨基酸</span>
                        <span class="pred-value" id="pred_total_amino_acid">--</span>
                    </div>
                    <div class="pred-item">
                        <span class="pred-label">乙酸乙酯</span>
                        <span class="pred-value" id="pred_ethyl_acetate">--</span>
                    </div>
                    <div class="pred-item">
                        <span class="pred-label">四甲基吡嗪</span>
                        <span class="pred-value" id="pred_tmp">--</span>
                    </div>
                    <div class="pred-item">
                        <span class="pred-label">乙酸</span>
                        <span class="pred-value" id="pred_acetic_acid">--</span>
                    </div>
                    <div class="pred-item">
                        <span class="pred-label">pH</span>
                        <span class="pred-value" id="pred_ph">--</span>
                    </div>
                </div>
            </div>

            <div class="result-section">
                <h2>综合评分预测</h2>
                <div class="overall-score">
                    <div class="score-circle">
                        <span id="pred_overall">--</span>
                        <span class="score-unit">分</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let trajectoryChart = null;

document.querySelectorAll('input[type="range"]').forEach(input => {
    input.addEventListener('input', function() {
        const valueSpan = document.getElementById(this.id + '_value');
        if (valueSpan) {
            valueSpan.textContent = this.value;
        }
        // 滑动时实时更新预测
        if (this.id === 'current_months' || this.id === 'target_months') {
            predictAging();
        }
    });
});

function getAgingParams() {
    return {
        process: document.getElementById('aging_process').value,
        raw_material: document.getElementById('aging_material').value,
        craft_style: document.getElementById('aging_style').value,
        aging_vessel: document.getElementById('aging_vessel').value,
        aging_temperature: document.getElementById('aging_temperature').value,
    };
}

async function predictAging() {
    const current = document.getElementById('current_months').value;
    const target = document.getElementById('target_months').value;
    const params = getAgingParams();

    document.getElementById('targetLabel').textContent = target;

    try {
        const [trajectoryData, agingData] = await Promise.all([
            fetch('/api/trajectory?' + new URLSearchParams(params)).then(r => r.json()),
            fetch('/api/aging?months=' + target + '&' + new URLSearchParams(params)).then(r => r.json())
        ]);

        updateTrajectoryChart(trajectoryData, target);

        document.getElementById('pred_total_acid').textContent = agingData.state.total_acid.toFixed(2) + ' g/100mL';
        document.getElementById('pred_non_volatile_acid').textContent = agingData.state.non_volatile_acid.toFixed(2) + ' g/100mL';
        document.getElementById('pred_reducing_sugar').textContent = agingData.state.reducing_sugar.toFixed(2) + ' g/100mL';
        document.getElementById('pred_total_amino_acid').textContent = agingData.state.total_amino_acid.toFixed(2) + ' g/100mL';
        document.getElementById('pred_ethyl_acetate').textContent = agingData.state.ethyl_acetate.toFixed(0) + ' μg/mL';
        document.getElementById('pred_tmp').textContent = agingData.state.tmp.toFixed(1) + ' μg/mL';
        document.getElementById('pred_acetic_acid').textContent = agingData.state.acetic_acid.toFixed(2) + ' g/100mL';
        document.getElementById('pred_ph').textContent = agingData.state.ph.toFixed(2);
        document.getElementById('pred_overall').textContent = agingData.overall.toFixed(1);
    } catch (error) {
        console.error('Error:', error);
    }
}

function updateTrajectoryChart(data, currentMonths) {
    const months = data.months;
    const params = data.parameters;

    // 找到当前醋龄对应的索引
    let currentIndex = months.indexOf(parseInt(currentMonths));
    if (currentIndex === -1) currentIndex = months.length - 1;

    const datasets = [
        { label: '总酸 (g/100mL)', data: params.total_acid, color: '#E74C3C' },
        { label: '不挥发酸 (g/100mL)', data: params.non_volatile_acid, color: '#27AE60' },
        { label: '乙酸 (g/100mL)', data: params.acetic_acid, color: '#3498DB' },
        { label: '乙酸乙酯 (×100 μg/mL)', data: params.ethyl_acetate.map(v => v / 100), color: '#9B59B6' },
        { label: '四甲基吡嗪 (μg/mL)', data: params.tmp, color: '#F39C12' },
    ];

    if (trajectoryChart) {
        trajectoryChart.destroy();
    }

    const ctx = document.getElementById('trajectoryChart').getContext('2d');
    trajectoryChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: months,
            datasets: datasets.map(ds => {
                // 为每个数据点创建背景色，当前点高亮
                const pointRadius = months.map((m, i) => i === currentIndex ? 8 : 4);
                const pointBackgroundColor = months.map((m, i) =>
                    i === currentIndex ? '#F39C12' : ds.color
                );
                const pointBorderColor = months.map((m, i) =>
                    i === currentIndex ? '#fff' : ds.color
                );

                return {
                    label: ds.label,
                    data: ds.data,
                    borderColor: ds.color,
                    backgroundColor: 'transparent',
                    fill: false,
                    tension: 0.4,
                    pointRadius: pointRadius,
                    pointHoverRadius: 6,
                    pointBackgroundColor: pointBackgroundColor,
                    pointBorderColor: pointBorderColor,
                    pointBorderWidth: months.map((m, i) => i === currentIndex ? 2 : 1),
                };
            })
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            interaction: {
                mode: 'index',
                intersect: false,
            },
            scales: {
                x: {
                    title: { display: true, text: '醋龄 (月)', font: { size: 12 } },
                    ticks: { font: { size: 10 } }
                },
                y: {
                    title: { display: true, text: '参数值', font: { size: 12 } },
                    ticks: { font: { size: 10 } }
                }
            },
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { font: { size: 10 }, boxWidth: 12 }
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return context.dataset.label + ': ' + context.parsed.y.toFixed(2);
                        },
                        title: function(context) {
                            return '醋龄: ' + context[0].label + '月' +
                                   (context[0].dataIndex === currentIndex ? ' (当前)' : '');
                        }
                    }
                }
            }
        }
    });
}

window.addEventListener('DOMContentLoaded', function() {
    predictAging();
});
</script>
{% endblock %}
